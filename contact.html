<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO-förbättringar -->
    <title>Kontakta Oss | Hårsalong Stockholm</title>
    <meta name="description" content="Professional hair salon offering haircuts, styling, coloring and personalized hair treatments. Book your appointment today.">
    <meta property="og:title" content="Hair Salon Stockholm | Professional Styling">
    <meta property="og:description" content="Professional haircuts, coloring and styling. Book your appointment today.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="images/logo.png">
    <meta property="og:url" content="https://sinnes7kx.github.io/WebsiteHair/contact.html">

    <!-- Liten ikon som syns på fliken -->
    <link rel="icon" type="image/png" href="images/favicon.png">

    <link rel="stylesheet" href="style.css">

    <!-- Strukturerad data för sökmotorer -->
    <script type="application/ld+json">
    {
     "@context":"https://schema.org",
     "@type":"HairSalon",
     "name":"Hårsalong Stockholm",
     "description":"Professional hair salon offering haircuts and styling.",
     "address":{
        "@type":"PostalAddress",
        "addressLocality":"Stockholm",
        "addressCountry":"SE"
     },
     "openingHours":
     [
        "Mo-Fr 10:00-19:00",
        "Sa 10:00-15:00"
     ]
    }
    </script>
</head>
<body>

<!-- Header med logo -->

    <header>
        <img src="images/logo.png" alt="logo hair salon scissors" class="logo">
    </header>

<!-- Navigeringsmeny -->

    <nav aria-label="Main Navigation">
        <ul>
            <li><a href="index.html">Hem</a></li>
            <li><a href="omoss.html">Om Oss</a></li>
            <li><a href="contact.html" class="active" aria-current="page">Kontakta Oss</a></li>
            <li><a href="bokning.html">Boka Tid</a></li>
            <li><a href="aktuellt.html">Aktuellt</a></li>
            <li><a href="hittahit.html">Hitta Hit</a></li>
        </ul>
    </nav>

<!-- Kontaktformulär -->

    <section>

        <h2>Kontaktformulär</h2><br>

        <form action="#">

            <label for="name">Namn</label>
            <input type="text" id="name" placeholder="Namn" name="name" required><br>

            <label for="email">E-post</label>
            <input type="email" id="email" placeholder="E-post" name="email" required><br>

            <label for="message">Meddelande</label>
            <textarea id="message" name="message" rows="6" required placeholder="Ditt meddelande"></textarea>

            <button type="button">Skicka</button>

        </form>

    </section>

<!-- Footer -->

    <footer>
        <p>&copy; 2026 Min Hemsida. Alla rättigheter förbehållna.</p>
    </footer>

</body>
</html>
