<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO-förbättringar -->
    <title>Boka Tid | Hårsalong Stockholm</title>
    <meta name="description" content="Professional hair salon offering haircuts, styling, coloring and personalized hair treatments. Book your appointment today.">
    <meta property="og:title" content="Hair Salon Stockholm | Professional Styling">
    <meta property="og:description" content="Professional haircuts, coloring and styling. Book your appointment today.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="images/logo.png">
    <meta property="og:url" content="https://sinnes7kx.github.io/WebsiteHair/bokning.html">

    <!-- Liten ikon som syns på fliken -->
    <link rel="icon" type="image/png" href="images/favicon.png">

    <link rel="stylesheet" href="style.css">

    <!-- Strukturerad data för sökmotorer -->
    <script type="application/ld+json">
    {
     "@context":"https://schema.org",
     "@type":"HairSalon",
     "name":"Hårsalong Stockholm",
     "description":"Professional hair salon offering haircuts and styling.",
     "address":{
        "@type":"PostalAddress",
        "addressLocality":"Stockholm",
        "addressCountry":"SE"
     },
     "openingHours":
     [
        "Mo-Fr 10:00-19:00",
        "Sa 10:00-15:00"
     ]
    }
    </script>
</head>
<body>

<!-- Header med logo -->

    <header>
        <img src="images/logo.png" alt="logo hair salon scissors" class="logo">
    </header>

<!-- Navigeringsmeny -->

    <nav aria-label="Main Navigation">
        <ul>
            <li><a href="index.html">Hem</a></li>
            <li><a href="omoss.html">Om Oss</a></li>
            <li><a href="contact.html">Kontakta Oss</a></li>
            <li><a href="bokning.html" class="active" aria-current="page">Boka Tid</a></li>
            <li><a href="aktuellt.html">Aktuellt</a></li>
            <li><a href="hittahit.html">Hitta Hit</a></li>
        </ul>
    </nav>

<!-- Bokning & behandlingar -->

<section class="booking">

    <h1>Välj behandling</h1><br>

    <form>

        <label class="service">
            <input type="radio" name="service" value="damklippning">
            <span class="name">Damklippning</span>
            <span class="time">60 min</span>
            <span class="price">650 kr</span>
        </label>

        <label class="service">
            <input type="radio" name="service" value="herrklippning">
            <span class="name">Herrklippning</span>
            <span class="time">45 min</span>
            <span class="price">450 kr</span>
        </label>

        <label class="service">
            <input type="radio" name="service" value="barn">
            <span class="name">Barnklippning</span>
            <span class="time">30 min</span>
            <span class="price">350 kr</span>
        </label>

        <label class="service">
            <input type="radio" name="service" value="tvatt">
            <span class="name">Tvätt &amp; Fön</span>
            <span class="time">30 min</span>
            <span class="price">350 kr</span>
        </label>

        <label class="service">
            <input type="radio" name="service" value="farg">
            <span class="name">Klipp &amp; Färg</span>
            <span class="time">120 min</span>
            <span class="price">1 450 kr</span>
        </label>

        <label class="service">
            <input type="radio" name="service" value="slingor">
            <span class="name">Slingor</span>
            <span class="time">150 min</span>
            <span class="price">Fr. 1 600 kr</span>
        </label>

        <label class="service">
            <input type="radio" name="service" value="balayage">
            <span class="name">Balayage</span>
            <span class="time">180 min</span>
            <span class="price">Fr. 2 100 kr</span>
        </label>

        <label class="service">
            <input type="radio" name="service" value="toning">
            <span class="name">Toning</span>
            <span class="time">60 min</span>
            <span class="price">850 kr</span>
        </label>

        <label class="service">
            <input type="radio" name="service" value="skagg">
            <span class="name">Skäggtrimning</span>
            <span class="time">20 min</span>
            <span class="price">250 kr</span>
        </label>

        <br>
        <button type="submit">Nästa</button>

    </form>

</section>

<!-- Footer -->

    <footer>
        <p>&copy; 2026 Min Hemsida. Alla rättigheter förbehållna.</p>
    </footer>

</body>
</html>
